<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Model Viewer</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #fff; font-family: -apple-system, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    model-viewer {
      width: 100vw;
      height: 85vh;
      background-color: #1a1a1a;
    }
    .footer {
      padding: 12px;
      font-size: 13px;
      color: #888;
      text-align: center;
    }
    .ar-hint {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <model-viewer
    src="https://drive.google.com/uc?export=download&id=1rrgizc4hACtr-5y6kvFy1ZZmdaEhPmNy"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    alt="3D Model">
    <button slot="ar-button" style="
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      color: #000;
      border: none;
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    ">📱 Открыть в AR</button>
  </model-viewer>
  <div class="footer">Нажми «Открыть в AR» чтобы посмотреть в реальном мире</div>
</body>
</html>
